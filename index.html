<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Progress Pemulihan Data</title>

<style>
body {
    font-family: "Segoe UI", Arial, sans-serif;
    background: #eef2f6;
    padding: 15px;
    margin: 0;
}

h2 { text-align: center; }

.subtitle {
    text-align: center;
    font-size: 13px;
    color: #7f8c8d;
}

.update-time {
    text-align: center;
    font-size: 12px;
    margin-bottom: 10px;
}

/* SEARCH */
.search {
    max-width: 400px;
    margin: 10px auto;
    display: block;
    padding: 8px;
    width: 100%;
    border-radius: 6px;
    border: 1px solid #ccc;
}

/* SUMMARY */
.summary {
    display: grid;
    grid-template-columns: repeat(2,1fr);
    gap: 10px;
    max-width: 1000px;
    margin: 10px auto;
}

.box {
    background: white;
    padding: 10px;
    border-radius: 8px;
    text-align: center;
    font-weight: bold;
}

.selesai { color: #27ae60; }
.proses { color: #f39c12; }
.belum { color: #e74c3c; }

/* GLOBAL BAR */
.global-bar {
    max-width: 1000px;
    margin: 10px auto;
    background: #ddd;
    border-radius: 10px;
    overflow: hidden;
}

.global-progress {
    height: 20px;
    background: linear-gradient(90deg,#2ecc71,#27ae60);
    color: white;
    text-align: center;
    font-size: 12px;
    line-height: 20px;
}

/* CARD */
.container {
    display: grid;
    gap: 10px;
    max-width: 1000px;
    margin: auto;
}

.card {
    background: white;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #dce1e7;
    cursor: pointer;
}

.card.red {
    border: 2px solid #e74c3c;
}

.user { font-weight: bold; }

.status { font-size: 12px; }

.detail { font-size: 12px; margin-bottom: 5px; }

.progress-bar {
    background: #ddd;
    height: 12px;
    border-radius: 10px;
    overflow: hidden;
}

.progress {
    height: 100%;
    text-align: center;
    color: white;
    font-size: 10px;
}

.green { background: #27ae60; }
.yellow { background: #f39c12; }
.redbar { background: #e74c3c; }

@media (min-width:600px){
    .container { grid-template-columns: repeat(2,1fr); }
    .summary { grid-template-columns: repeat(5,1fr); }
}

@media (min-width:900px){
    .container { grid-template-columns: repeat(3,1fr); }
}
</style>
</head>

<body>

<h2>Progress Pemulihan Data</h2>
<div class="subtitle">Dashboard Recovery</div>
<div class="update-time" id="updateTime"></div>

<input type="text" class="search" placeholder="Cari nama..." onkeyup="searchUser(this.value)">

<div class="summary">
<div class="box selesai">✔ <span id="done"></span><br>Selesai</div>
<div class="box proses">⚠ <span id="process"></span><br>Proses</div>
<div class="box belum">✖ <span id="notyet"></span><br>Belum</div>
<div class="box">📊 <span id="total"></span><br>Total</div>
<div class="box">📈 <span id="percent"></span><br>Progress</div>
</div>

<div class="global-bar">
<div class="global-progress" id="globalProgress"></div>
</div>

<div class="container" id="container"></div>

<script>
let data = [...]; // (pakai data sebelumnya Abi)

const passwords = {}; // (pakai password sebelumnya Abi)

function updateTime(){
document.getElementById("updateTime").innerText =
"Update: " + new Date().toLocaleString('id-ID');
}

function sortData(){
data.sort((a,b)=> a.progress - b.progress);
}

function getStyle(p){
if(p==100) return ["green","✔ selesai"];
if(p==0) return ["redbar","✖ belum"];
return ["yellow","⚠ proses"];
}

function render(){
let html="";
data.forEach(u=>{
let [bar,stat]=getStyle(u.progress);
let lock = u.progress<100 ? "🔒" : "";
let red = u.progress==0 ? "red":"";

html+=`
<div class="card ${red}" onclick="toggle('${u.name}')">
<div class="user">${u.name} ${lock}</div>
<div class="status">${stat}</div>
<div class="detail">${u.detail}</div>
<div class="progress-bar">
<div class="progress ${bar}" style="width:${u.progress}%">${u.progress}%</div>
</div>
<div id="file-${u.name}" style="display:none">
<ul><li>file1</li><li>file2</li></ul>
</div>
</div>`;
});
document.getElementById("container").innerHTML=html;
}

function updateSummary(){
let done=0,process=0,notyet=0;

data.forEach(u=>{
if(u.progress==100) done++;
else if(u.progress==0) notyet++;
else process++;
});

let total=data.length;
let percent=Math.round(done/total*100);

document.getElementById("done").innerText=done;
document.getElementById("process").innerText=process;
document.getElementById("notyet").innerText=notyet;
document.getElementById("total").innerText=total;
document.getElementById("percent").innerText=percent+"%";

document.getElementById("globalProgress").style.width=percent+"%";
document.getElementById("globalProgress").innerText=percent+"%";
}

function toggle(name){
let user=data.find(u=>u.name==name);

if(user.progress<100){
alert("Belum selesai recovery!");
return;
}

let pass=prompt("Password:");
if(pass===passwords[name]){
let el=document.getElementById("file-"+name);
el.style.display=el.style.display=="none"?"block":"none";
}else alert("Salah!");
}

function searchUser(val){
val=val.toLowerCase();
document.querySelectorAll(".card").forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(val)?"block":"none";
});
}

function init(){
sortData();
updateTime();
render();
updateSummary();
}

init();

setInterval(init,30000);
</script>

</body>
</html>
