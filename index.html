<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Progress Pemulihan Data</title>

<style>
body {
    font-family: "Segoe UI", Arial, sans-serif;
    background: #eef2f6;
    padding: 15px;
    margin: 0;
}

h2 {
    text-align: center;
    color: #2c3e50;
    font-size: 20px;
    margin-bottom: 5px;
}

.subtitle {
    text-align: center;
    font-size: 13px;
    color: #7f8c8d;
    margin-bottom: 10px;
}

.update-time {
    text-align: center;
    font-size: 12px;
    color: #7f8c8d;
    margin-bottom: 15px;
}

/* SUMMARY */
.summary {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    max-width: 1000px;
    margin: 10px auto 20px;
}

.box {
    background: white;
    padding: 10px;
    border-radius: 8px;
    text-align: center;
    font-size: 13px;
    border: 1px solid #dce1e7;
    font-weight: 600;
}

.box.selesai { color: #27ae60; }
.box.proses { color: #f39c12; }
.box.belum { color: #e74c3c; }
.box.total { color: #34495e; }

/* CARD */
.container {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
    max-width: 1000px;
    margin: auto;
}

.card {
    background: #ffffff;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #dce1e7;
}

.user {
    font-weight: 600;
    color: #34495e;
    font-size: 14px;
}

.status {
    font-size: 12px;
    margin: 5px 0;
    font-weight: 500;
}

.selesai { color: #27ae60; }
.proses { color: #f39c12; }
.belum { color: #e74c3c; }

.detail {
    font-size: 12px;
    color: #555;
    margin-bottom: 8px;
}

.progress-bar {
    width: 100%;
    background: #dfe6ed;
    border-radius: 10px;
    overflow: hidden;
    height: 14px;
}

.progress {
    height: 100%;
    text-align: center;
    color: white;
    font-size: 10px;
    line-height: 14px;
}

.green { background: linear-gradient(90deg, #2ecc71, #27ae60); }
.yellow { background: linear-gradient(90deg, #f1c40f, #f39c12); }
.red { background: linear-gradient(90deg, #e74c3c, #c0392b); }

/* RESPONSIVE */
@media (min-width: 600px) {
    .container { grid-template-columns: repeat(2, 1fr); }
    .summary { grid-template-columns: repeat(4, 1fr); }
}

@media (min-width: 900px) {
    .container { grid-template-columns: repeat(3, 1fr); }
}
</style>
</head>

<body>

<h2>Progress Pemulihan Data User</h2>
<div class="subtitle">Ringkasan Progress Recovery</div>
<div class="update-time" id="updateTime"></div>

<div class="summary">
    <div class="box selesai">✔ <span id="done">0</span><br>Selesai Recovery</div>
    <div class="box proses">⚠ <span id="process">0</span><br>Proses Recovery</div>
    <div class="box belum">✖ <span id="notyet">0</span><br>Belum Recovery</div>
    <div class="box total">📊 <span id="total">0</span><br>Total Data</div>
</div>

<div class="container" id="container"></div>

<script>
const data = [
{name:"Agung", progress:100, status:"Selesai (Recovery dari server)", detail:"Backup terdapat di laptopnya"},
{name:"Airin", progress:10, status:"Belum recovery", detail:"Data ada di server, backup terdapat di laptop Santi, belum dicek di laptop pribadi"},
{name:"Alfi", progress:10, status:"Belum recovery", detail:"Data ada di server, backup terdapat di laptop Daniel dan Santi"},
{name:"Ara", progress:100, status:"Selesai (Recovery dari server)", detail:"Belum dicek di laptop pribadi"},
{name:"Cornel", progress:10, status:"Belum recovery", detail:"Data ada di server, backup terdapat di laptop Santi"},
{name:"Daniel", progress:10, status:"Belum recovery", detail:"Backup terdapat di laptopnya dan laptop Santi"},
{name:"Dian", progress:100, status:"Selesai (Recovery dari server)", detail:"Berhasil recovery dari server"},
{name:"Dimas", progress:10, status:"Belum recovery", detail:"Backup terdapat di laptop Santi"},
{name:"Fenni", progress:0, status:"Belum ada data", detail:""},
{name:"Fifi", progress:0, status:"Belum ada data", detail:""},
{name:"Fildzah", progress:0, status:"Belum ada data", detail:""},
{name:"Heni", progress:10, status:"Belum recovery", detail:"Backup terdapat di laptop Santi"},
{name:"Ica", progress:10, status:"Belum recovery", detail:"Backup terdapat di laptop Santi"},
{name:"Indri", progress:10, status:"Belum recovery", detail:"Backup terdapat di laptop Santi"},
{name:"Intan", progress:10, status:"Belum recovery", detail:"Backup terdapat di laptop Santi"},
{name:"Ivana", progress:10, status:"Belum recovery", detail:"Backup terdapat di laptop Santi"},
{name:"Jessica", progress:10, status:"Belum recovery", detail:"Backup terdapat di laptopnya"},
{name:"Jujulia", progress:0, status:"Belum dicek", detail:"Belum dicek di laptopnya"},
{name:"Lisa", progress:0, status:"Belum dicek", detail:"Belum dicek di laptopnya"},
{name:"Maya", progress:0, status:"Belum ada data", detail:""},
{name:"Milah", progress:100, status:"Selesai (Recovery dari server)", detail:"Berhasil recovery dari server"},
{name:"Indah", progress:0, status:"Belum dicek", detail:"Belum dicek di laptopnya"},
{name:"Nella", progress:10, status:"Belum recovery", detail:"Backup terdapat di laptopnya"},
{name:"Public", progress:10, status:"Belum recovery", detail:"Backup terdapat di laptop Daniel, Agung, Nella, Intan, Jessica"},
{name:"Raymond", progress:0, status:"Belum dicek", detail:"Belum dicek di laptopnya"},
{name:"Santi", progress:10, status:"Belum recovery", detail:"Backup terdapat di laptopnya"},
{name:"Steffi", progress:10, status:"Belum recovery", detail:"Backup terdapat di laptop Santi"},
{name:"Vania", progress:0, status:"Belum ada data", detail:""},
{name:"Vioni", progress:10, status:"Belum recovery", detail:"Backup terdapat di laptop Santi"},
{name:"Wilma", progress:100, status:"Selesai (Recovery dari server)", detail:"Berhasil recovery dari server"},
{name:"Yusuf", progress:100, status:"Selesai (Recovery dari server)", detail:"Berhasil recovery dari server"}
];

const container = document.getElementById("container");

function updateTime() {
    document.getElementById("updateTime").innerText =
        "Terakhir diperbarui: " + new Date().toLocaleString('id-ID');
}

function getStatusStyle(progress){
    if(progress === 100) return {bar:"green", text:"selesai", icon:"✔"};
    if(progress === 0) return {bar:"red", text:"belum", icon:"✖"};
    return {bar:"yellow", text:"proses", icon:"⚠"};
}

function updateSummary(){
    let done = 0, process = 0, notyet = 0;

    data.forEach(u => {
        if(u.progress === 100) done++;
        else if(u.progress === 0) notyet++;
        else process++;
    });

    document.getElementById("done").innerText = done;
    document.getElementById("process").innerText = process;
    document.getElementById("notyet").innerText = notyet;
    document.getElementById("total").innerText = data.length;
}

function render() {
    container.innerHTML = "";
    data.forEach(u => {
        let s = getStatusStyle(u.progress);

        container.innerHTML += `
        <div class="card">
            <div class="user">${u.name}</div>
            <div class="status ${s.text}">${s.icon} ${u.status}</div>
            <div class="detail">${u.detail}</div>
            <div class="progress-bar">
                <div class="progress ${s.bar}" style="width:${u.progress}%">
                    ${u.progress}%
                </div>
            </div>
        </div>
        `;
    });
}

updateTime();
render();
updateSummary();

setInterval(() => {
    updateTime();
    render();
    updateSummary();
}, 30000);
</script>

</body>
</html>
