<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Recovery</title>

<style>
body {font-family: Arial; background:#eef2f6; margin:0; padding:15px;}
h2{text-align:center;}
.subtitle{text-align:center;font-size:13px;color:#666;}
.update-time{text-align:center;font-size:12px;margin-bottom:10px;}

.search{width:100%;max-width:400px;margin:10px auto;display:block;padding:8px;}

.summary{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:10px auto;max-width:1000px;}
.box{background:#fff;padding:10px;border-radius:8px;text-align:center;font-weight:bold;}
.selesai{color:#27ae60;}
.proses{color:#f39c12;}
.belum{color:#e74c3c;}

.container{display:grid;gap:10px;max-width:1000px;margin:auto;}
.card{background:#fff;padding:12px;border-radius:8px;border:1px solid #ccc;}
.card.red{border:2px solid #e74c3c;background:#fff6f6;}

.user{font-weight:bold;margin-bottom:5px;}
.detail{font-size:12px;margin-bottom:8px;color:#555;}

.progress-bar{background:#ddd;height:12px;border-radius:10px;}
.progress{height:100%;color:#fff;font-size:10px;text-align:center;line-height:12px;}

.green{background:#27ae60;}
.yellow{background:#f39c12;}
.redbar{background:#e74c3c;}

.btn{
margin-top:8px;
padding:6px 10px;
border:none;
background:#3498db;
color:white;
border-radius:5px;
cursor:pointer;
font-size:12px;
}

/* POPUP */
#popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
z-index:999;
align-items:center;
justify-content:center;
}

.popup-box{
background:white;
padding:20px;
border-radius:10px;
width:90%;
max-width:350px;
max-height:80%;
overflow:auto;
position:relative;
}
</style>
</head>

<body>

<h2>Dashboard Recovery</h2>
<div class="subtitle">Monitoring Pemulihan Data</div>
<div class="update-time" id="time"></div>

<input class="search" placeholder="Cari nama..." onkeyup="searchUser(this.value)">

<div class="summary">
<div class="box selesai">✔ <span id="done"></span><br>Selesai</div>
<div class="box proses">⚠ <span id="process"></span><br>Proses</div>
<div class="box belum">✖ <span id="notyet"></span><br>Belum</div>
<div class="box">📊 <span id="total"></span><br>Total</div>
</div>

<div id="container" class="container"></div>

<!-- POPUP -->
<div id="popup">
  <div class="popup-box">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <b id="popupTitle"></b>
      <span onclick="closePopup()" style="cursor:pointer;font-size:18px;">❌</span>
    </div>
    <div id="popupContent" style="margin-top:10px;"></div>
  </div>
</div>

<script>

const data = [
{name:"Agung",progress:100,detail:"Selesai (Recovery dari server). Backup terdapat di laptopnya"},
{name:"Airin",progress:10,detail:"Data ada di server, backup terdapat di laptop Santi, belum dicek di laptop pribadi"},
{name:"Alfi",progress:10,detail:"Data ada di server, backup terdapat di laptop Daniel dan Santi"},
{name:"Ara",progress:100,detail:"Selesai (Recovery dari server), belum dicek di laptop pribadi"},
{name:"Cornel",progress:10,detail:"Data ada di server, backup terdapat di laptop Santi"},
{name:"Daniel",progress:10,detail:"Backup terdapat di laptopnya dan laptop Santi"},
{name:"Dian",progress:100,detail:"Selesai (Recovery dari server)"},
{name:"Dimas",progress:10,detail:"Backup terdapat di laptop Santi"},
{name:"Fenni",progress:0,detail:"Belum ada data"},
{name:"Fifi",progress:0,detail:"Belum ada data"},
{name:"Fildzah",progress:0,detail:"Belum ada data"},
{name:"Heni",progress:10,detail:"Backup terdapat di laptop Santi"},
{name:"Ica",progress:10,detail:"Backup terdapat di laptop Santi"},
{name:"Indri",progress:10,detail:"Backup terdapat di laptop Santi"},
{name:"Intan",progress:10,detail:"Backup terdapat di laptop Santi"},
{name:"Ivana",progress:10,detail:"Backup terdapat di laptop Santi"},
{name:"Jessica",progress:10,detail:"Backup terdapat di laptopnya"},
{name:"Jujulia",progress:0,detail:"Belum dicek di laptopnya"},
{name:"Lisa",progress:0,detail:"Belum dicek di laptopnya"},
{name:"Maya",progress:0,detail:"Belum ada data"},
{name:"Milah",progress:100,detail:"Selesai (Recovery dari server)"},
{name:"Indah",progress:0,detail:"Belum dicek di laptopnya"},
{name:"Nella",progress:10,detail:"Backup terdapat di laptopnya"},
{name:"Public",progress:10,detail:"Backup terdapat di laptop Daniel, Agung, Nella, Intan, Jessica"},
{name:"Raymond",progress:0,detail:"Belum dicek di laptopnya"},
{name:"Santi",progress:100,detail:"Selesai (Recovery dari server)"},
{name:"Steffi",progress:100,detail:"Selesai (Recovery dari server)"},
{name:"Vania",progress:100,detail:"Selesai (Recovery dari server)"},
{name:"Vioni",progress:100,detail:"Selesai (Recovery dari server)"},
{name:"Wilma",progress:100,detail:"Selesai (Recovery dari server)"},
{name:"Yusuf",progress:100,detail:"Selesai (Recovery dari server)"}
];

const passwords = {
"Yusuf":"Y4vT9!p"
};

const fileData = {
"Yusuf":[
"📁 PT ASA BARA INTERNASIONAL",
"📁 PT CAHAYA PERKASA MANDIRI",
"📁 PT DEMSSKA MANDIRI SEJAHTERA",
"📁 PT. EKA DWIKA PERKASA",
"📁 PT. INDOHANSA SENTRAFILTRA (Daniel)",
"📁 PT. INDOHANSA SENTRAFILTRA KENCANA",
"📁 PT. KAIYUAN INTERNATIONAL TRADING",
"📁 PT. UNIVERSAL TEKNOLOGI SEJAHTERA",
"📁 PT. UNRIA PRATAMA KENCANA",
"📄 EFIN EMAIL NO HP KLIEN - YUSUF.xlsx",
"📄 GAJI UPAH & PIUT KARY.xlsx",
"📄 SAMA GL GAJI & PIUT.xlsx"
]
};

/* MASKING */
function maskText(text){
if(text.length <= 10) return text;
return text.substring(0,10) + "......";
}

function render(){
data.sort((a,b)=>a.progress-b.progress);

let html="";
data.forEach(u=>{
let color=u.progress==100?"green":u.progress==0?"redbar":"yellow";
let red=u.progress==0?"red":"";

html+=`
<div class="card ${red}">
<div class="user">${u.name}</div>
<div class="detail">${u.detail}</div>

<div class="progress-bar">
<div class="progress ${color}" style="width:${u.progress}%">${u.progress}%</div>
</div>

<button class="btn" onclick="openData('${u.name}')">📂 Lihat Data</button>
</div>`;
});

document.getElementById("container").innerHTML=html;
updateSummary();
}

function updateSummary(){
let done=0,process=0,notyet=0;
data.forEach(u=>{
if(u.progress==100)done++;
else if(u.progress==0)notyet++;
else process++;
});

document.getElementById("done").innerText=done;
document.getElementById("process").innerText=process;
document.getElementById("notyet").innerText=notyet;
document.getElementById("total").innerText=data.length;
}

function openData(name){
let user=data.find(u=>u.name==name);

if(user.progress<100){
alert("Data belum selesai recovery!");
return;
}

let pass=prompt("Masukkan password:");
if(name==="Yusuf" && pass!==passwords[name]){
alert("Password salah!");
return;
}

let files = fileData[name] || ["Belum ada data"];

let html="<ul>";
files.forEach(f=>{
html += "<li>"+maskText(f)+"</li>";
});
html+="</ul>";

showPopup("Isi Folder "+name, html);
}

function showPopup(title, content){
document.getElementById("popupTitle").innerText = title;
document.getElementById("popupContent").innerHTML = content;
document.getElementById("popup").style.display = "flex";
}

function closePopup(){
document.getElementById("popup").style.display = "none";
}

function searchUser(val){
val=val.toLowerCase();
document.querySelectorAll(".card").forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(val)?"block":"none";
});
}

function updateTime(){
document.getElementById("time").innerText=new Date().toLocaleString();
}

function init(){
render();
updateTime();
}

init();
setInterval(init,30000);

</script>

</body>
</html>
